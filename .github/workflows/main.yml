name: Build Windows Installer
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '5.15.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_mingw81'

      - name: Build
        shell: cmd
        run: |
          mkdir build
          cd build
          qmake ..\MUFCalc\MUFCalc.pro CONFIG+=release
          mingw32-make -j4

      - name: Deploy Qt dependencies
        shell: pwsh
        run: |          $env:PATH = "$env:Qt5_Dir\bin;$env:PATH"
          New-Item -ItemType Directory -Force -Path deploy
          Copy-Item "build\release\MUFCalc.exe" "deploy\"
          cd deploy
          windeployqt --release MUFCalc.exe














          }

      - name: Build Installer
        shell: cmd
        run: |
          choco install innosetup -y
          iscc installer.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: MUFCalc-Installer
          path: Output\MUFCalcSetup.exe

